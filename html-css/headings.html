<!-- 
  QUESTION: What heading level should directly follow an <h1>?
  ANSWER: An <h2>. You must never skip hierarchy levels (e.g., going from h1 straight to h4). Screen readers use this hierarchy to build a structural table of contents for blind users. Skipping levels breaks their navigation.
-->
<h1>My Portfolio</h1>
<h2>About Me</h2>
<h3>My Background</h3>
<h2>Skills</h2>
<h3>JavaScript</h3>
<h2>Contact</h2>
